<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 3x3 Grid for 15-puzzle -->
  <defs>
    <style>
      .puzzle-tile { fill: #00bcd4; stroke: #fff; stroke-width: 2; }
      .puzzle-number { font-size: 24px; font-weight: bold; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
      .puzzle-empty { fill: #333; stroke: #666; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Tiles -->
  <g id="grid">
    <!-- Row 1 -->
    <rect x="10" y="10" width="50" height="50" class="puzzle-tile"/>
    <text x="35" y="35" class="puzzle-number">1</text>
    
    <rect x="70" y="10" width="50" height="50" class="puzzle-tile"/>
    <text x="95" y="35" class="puzzle-number">2</text>
    
    <rect x="130" y="10" width="50" height="50" class="puzzle-tile"/>
    <text x="155" y="35" class="puzzle-number">3</text>
    
    <!-- Row 2 -->
    <rect x="10" y="70" width="50" height="50" class="puzzle-tile"/>
    <text x="35" y="95" class="puzzle-number">4</text>
    
    <rect x="70" y="70" width="50" height="50" class="puzzle-tile"/>
    <text x="95" y="95" class="puzzle-number">5</text>
    
    <rect x="130" y="70" width="50" height="50" class="puzzle-tile"/>
    <text x="155" y="95" class="puzzle-number">6</text>
    
    <!-- Row 3 -->
    <rect x="10" y="130" width="50" height="50" class="puzzle-tile"/>
    <text x="35" y="155" class="puzzle-number">7</text>
    
    <rect x="70" y="130" width="50" height="50" class="puzzle-tile"/>
    <text x="95" y="155" class="puzzle-number">8</text>
    
    <rect x="130" y="130" width="50" height="50" class="puzzle-empty"/>
  </g>
</svg>
