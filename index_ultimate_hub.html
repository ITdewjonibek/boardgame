<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🎮 ULTIMATE GAME HUB - Ta'limiy O'yinlar Platformasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ffff;
            --secondary: #00ff88;
            --dark: #0a0e27;
            --card: rgba(20, 10, 40, 0.8);
            --neon-pink: #ff00ff;
            --neon-purple: #9000ff;
            --neon-yellow: #ffaa00;
            --neon-green: #00ff88;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #2d0a4d 100%);
            color: #e0e6ff;
            overflow: hidden;
        }

        /* ============ COSMIC BG ============ */
        #cosmic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ============ MAIN LAYOUT ============ */
        .app {
            position: fixed;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 180px 1fr 280px;
            grid-template-rows: 70px 1fr 50px;
            gap: 0;
            z-index: 1;
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 20px var(--primary);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .header-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-badge {
            padding: 8px 16px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid var(--primary);
            border-radius: 20px;
            color: var(--primary);
            font-size: 12px;
            font-weight: bold;
        }

        .sidebar-left {
            grid-column: 1;
            grid-row: 2;
            background: rgba(10, 14, 39, 0.95);
            border-right: 2px solid var(--primary);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-btn {
            padding: 12px;
            background: rgba(0, 255, 255, 0.08);
            border: 2px solid rgba(0, 255, 255, 0.3);
            color: var(--primary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
            transform: translateX(5px);
        }

        .main {
            grid-column: 2;
            grid-row: 2;
            overflow-y: auto;
            padding: 20px;
            background: rgba(10, 14, 39, 0.5);
        }

        .sidebar-right {
            grid-column: 3;
            grid-row: 2;
            background: rgba(10, 14, 39, 0.95);
            border-left: 2px solid var(--primary);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-title {
            color: var(--secondary);
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary);
            text-shadow: 0 0 10px var(--secondary);
        }

        .leaderboard-item {
            padding: 10px;
            background: rgba(0, 255, 255, 0.08);
            border-left: 3px solid var(--secondary);
            border-radius: 5px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }

        .rank {
            background: var(--primary);
            color: #000;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
        }

        .footer {
            grid-column: 1 / -1;
            grid-row: 3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(10, 14, 39, 0.95);
            border-top: 2px solid var(--primary);
            padding: 0 20px;
            font-size: 11px;
            color: var(--primary);
            flex-wrap: wrap;
        }

        .footer-stat {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .stat-val {
            color: var(--secondary);
            font-weight: bold;
        }

        /* ============ GAMES GRID ============ */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
        }

        .game-card {
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: all 0.5s ease;
        }

        .game-card:hover {
            border-color: var(--secondary);
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 40px var(--secondary);
            transform: scale(1.08);
        }

        .game-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .game-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .game-desc {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .play-btn {
            padding: 6px 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            color: #000;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            box-shadow: 0 0 20px var(--secondary);
            transform: scale(1.1);
        }

        /* ============ MODAL ============ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(20, 10, 40, 0.95);
            border: 3px solid var(--primary);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 50px var(--primary), inset 0 0 30px rgba(0, 255, 255, 0.1);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--secondary);
        }

        .modal-title {
            color: var(--primary);
            font-size: 24px;
            text-shadow: 0 0 15px var(--primary);
        }

        .close-btn {
            background: rgba(255, 0, 0, 0.5);
            border: 2px solid #ff0000;
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        .question-box {
            margin: 20px 0;
        }

        .timer {
            color: var(--secondary);
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 0 10px var(--secondary);
            margin-bottom: 15px;
        }

        .question-text {
            color: var(--primary);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(0, 255, 255, 0.08);
            border-left: 4px solid var(--secondary);
            border-radius: 8px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .option {
            padding: 12px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-align: left;
        }

        .option:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        .option.correct {
            background: var(--secondary);
            border-color: var(--secondary);
            color: #000;
            box-shadow: 0 0 20px var(--secondary);
            animation: pulse 0.6s ease;
        }

        .option.wrong {
            background: rgba(255, 0, 0, 0.3);
            border-color: #ff0000;
            color: #ff0000;
            animation: shake 0.4s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid var(--primary);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--secondary);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn-primary,
        .btn-secondary {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #000;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 25px var(--secondary);
            transform: scale(1.05);
        }

        .btn-secondary {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        .btn-primary:disabled,
        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* CANVAS */
        .game-canvas {
            width: 100%;
            height: 250px;
            background: rgba(0, 50, 100, 0.2);
            border: 2px solid var(--primary);
            border-radius: 10px;
            margin: 15px 0;
            display: block;
        }

        /* CONFETTI */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 998;
            pointer-events: none;
        }

        /* RESULTS */
        .results-container {
            text-align: center;
        }

        .results-score {
            font-size: 60px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
            margin: 30px 0;
        }

        .results-percentage {
            font-size: 48px;
            color: var(--secondary);
            margin: 20px 0;
        }

        .results-feedback {
            font-size: 32px;
            margin: 20px 0;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 10px;
            box-shadow: 0 0 10px var(--primary);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--secondary), var(--primary));
        }

        /* RESPONSIVE */
        @media (max-width: 1200px) {
            .app {
                grid-template-columns: 150px 1fr 220px;
            }
        }

        @media (max-width: 768px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: 60px 1fr 50px;
            }

            .sidebar-left,
            .sidebar-right,
            .header-stats {
                display: none;
            }

            .main {
                grid-column: 1;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }

            .modal-content {
                max-width: 95vw;
                max-height: 90vh;
                padding: 20px;
            }
        }
    </style>
</head>

    <script>
        // ============ COSMIC BACKGROUND ============
        function initCosmic() {
            const canvas = document.getElementById('cosmic-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5,
                    v: Math.random() * 0.3,
                    opacity: Math.random() * 0.7 + 0.3
                });
            }

            function animate() {
                ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();

                    p.y -= p.v;
                    if (p.y < 0) p.y = canvas.height;
                    p.opacity = Math.sin(Date.now() * 0.001 + p.x) * 0.5 + 0.5;
                });

                requestAnimationFrame(animate);
            }

            animate();
        }

        let currentGame = null;
        let currentQuestion = 0;
        let score = 0;
        let timeLeft = 60;
        let timerInterval = null;
        let currentDifficulty = 'Oson';

        // ============ RENDER GAMES ============
        function renderGames() {
            const grid = document.getElementById('games-view');
            grid.innerHTML = GAMES.map(g => `
                <div class="game-card" onclick="startGame(${g.id})">
                    <div class="game-icon">${g.icon}</div>
                    <div class="game-title">${g.title}</div>
                    <div class="game-desc">${g.desc}</div>
                    <button class="play-btn">▶ O'YNA</button>
                </div>
            `).join('');
        }

        // ============ LEADERBOARD ============
        function renderLeaderboard() {
            const lb = document.getElementById('leaderboard');
            const users = [
                { rank: 1, name: 'Alex Pro', score: 50000 },
                { rank: 2, name: 'Ninja', score: 48000 },
                { rank: 3, name: 'Master', score: 46500 },
                { rank: 4, name: 'Legend', score: 45200 },
                { rank: 5, name: 'You', score: 42800 }
            ];

            lb.innerHTML = users.map(u => `
                <div class="leaderboard-item">
                    <span><div class="rank">${u.rank}</div> ${u.name}</span>
                    <span style="color: var(--secondary); font-weight: bold;">${u.score.toLocaleString()}</span>
                </div>
            `).join('');
        }

        // ============ START GAME ============
        function startGame(gameId) {
            currentGame = GAMES[gameId - 1];
            currentQuestion = 0;
            score = 0;
            document.getElementById('gameModal').classList.add('active');
            document.getElementById('modalTitle').textContent = `${currentGame.icon} ${currentGame.title}`;
            loadQuestion(gameId);
        }

        // ============ LOAD QUESTION ============
        function loadQuestion(gameId) {
            const bank = QUESTIONS[gameId];
            if (!bank) return;

            const questions = bank[currentDifficulty] || [];
            if (currentQuestion >= questions.length) {
                showResults(questions.length);
                return;
            }

            const q = questions[currentQuestion];
            const progress = ((currentQuestion + 1) / questions.length) * 100;

            document.getElementById('modalBody').innerHTML = `
                <div class="question-box">
                    <div class="timer">⏱️ ${timeLeft}s</div>
                    <div class="question-text">${q.q}</div>
                    <div class="options-grid">
                        ${q.opts.map((opt, i) => `
                            <button class="option" onclick="selectAnswer(${gameId}, ${i}, ${q.correct})">
                                ${String.fromCharCode(65 + i)}) ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                </div>
            `;

            startTimer(gameId);
        }

        // ============ SELECT ANSWER ============
        function selectAnswer(gameId, selected, correct) {
            clearInterval(timerInterval);
            const options = document.querySelectorAll('.option');
            let correct_count = 0;

            options.forEach((opt, i) => {
                opt.disabled = true;
                if (i === correct) {
                    opt.classList.add('correct');
                    correct_count++;
                }
                if (i === selected && i !== correct) {
                    opt.classList.add('wrong');
                }
            });

            if (selected === correct) {
                score++;
                playSound('correct');
                createConfetti();
            } else {
                playSound('wrong');
            }

            setTimeout(() => {
                currentQuestion++;
                loadQuestion(gameId);
            }, 1500);
        }

        // ============ TIMER ============
        function startTimer(gameId) {
            timeLeft = 60;
            timerInterval = setInterval(() => {
                timeLeft--;
                const timer = document.querySelector('.timer');
                if (timer) timer.textContent = `⏱️ ${timeLeft}s`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    currentQuestion++;
                    loadQuestion(gameId);
                }
            }, 1000);
        }

        // ============ RESULTS ============
        function showResults(total) {
            const percentage = Math.round((score / total) * 100);
            const badge = percentage >= 80 ? '🌟' : percentage >= 60 ? '👍' : '💪';

            document.getElementById('modalBody').innerHTML = `
                <div class="results-container">
                    <h2 style="color: var(--secondary); font-size: 28px; margin: 20px 0;">NATIJA</h2>
                    <div class="results-score">${score}/${total}</div>
                    <div class="results-percentage">${percentage}%</div>
                    <div class="results-feedback">${badge}</div>
                    <p style="color: #aaa; font-size: 16px;">
                        ${percentage >= 80 ? '✨ AJOYIB! MASTER BOLIB QALDINGIZ!' : percentage >= 60 ? '👍 YAXSHI! DAVOM ETING.' : '💪 YANA URINIB KO\'RING!'}
                    </p>
                    <div class="action-buttons">
                        <button class="btn-primary" onclick="closeGame()">YOPISH</button>
                    </div>
                </div>
            `;
        }

        // ============ SOUNDS ============
        function playSound(type) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            if (type === 'correct') {
                osc.frequency.value = 800;
                gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            } else {
                osc.frequency.value = 300;
                gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            }

            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + (type === 'correct' ? 0.2 : 0.3));
        }

        // ============ CONFETTI ============
        function createConfetti() {
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * window.innerWidth + 'px';
                conf.style.top = Math.random() * window.innerHeight + 'px';
                conf.style.backgroundColor = ['#00ffff', '#00ff88', '#ff00ff', '#ffaa00'][Math.floor(Math.random() * 4)];
                document.body.appendChild(conf);

                setTimeout(() => conf.remove(), 2000);
            }
        }

        // ============ CLOSE GAME ============
        function closeGame() {
            document.getElementById('gameModal').classList.remove('active');
            clearInterval(timerInterval);
        }

        // ============ INIT ============
        document.addEventListener('DOMContentLoaded', () => {
            initCosmic();
            renderGames();
            renderLeaderboard();

            // Nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');

                    const section = e.target.dataset.section;
                    document.getElementById('games-view').style.display = section === 'games' ? 'grid' : 'none';
                    document.getElementById('other-view').style.display = section !== 'games' ? 'block' : 'none';
                });
            });
        });

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('cosmic-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
